{% load static %}
<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload Excel - ITS INVENTORY</title>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: "#eefaf8",
              100: "#d7f3ed",
              200: "#b0e6da",
              300: "#7fd4c1",
              400: "#47bfa5",
              500: "#219a83",
              600: "#177865",
              700: "#155f53",
              800: "#154d45",
              900: "#123f3a",
            },
          },
          boxShadow: {
            soft: "0 20px 50px rgba(15, 23, 42, 0.12)",
          },
          fontFamily: {
            sans: ["Inter", "Segoe UI", "system-ui", "sans-serif"],
          },
        },
      },
    };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="{% static 'css/inventory_upload.css' %}" />
</head>

<body class="min-h-screen font-sans text-slate-900 antialiased flex items-center justify-center p-4">
  <main class="w-full max-w-lg">
    <section
      class="backdrop-card overflow-hidden rounded-3xl border border-white/70 shadow-soft ring-1 ring-slate-200/60 p-8">
      <div class="mb-6 text-center">
        <h1 class="text-2xl font-bold tracking-tight text-slate-900">
          Upload Inventory Data
        </h1>
        <p class="mt-2 text-sm text-slate-600">
          Select an Excel (.xlsx) or CSV file to upload records to the
          database.
        </p>
      </div>

      {% if messages %}
      <div class="space-y-3 mb-6">
        {% for message in messages %}
        <div
          class="rounded-2xl border px-4 py-3 text-sm shadow-sm {% if message.tags == 'success' %}border-emerald-200 bg-emerald-50 text-emerald-800{% elif message.tags == 'warning' %}border-amber-200 bg-amber-50 text-amber-800{% else %}border-rose-200 bg-rose-50 text-rose-800{% endif %}">
          {{ message }}
        </div>
        {% endfor %}
      </div>
      {% endif %}

      <form method="POST" enctype="multipart/form-data" class="space-y-6">
        {% csrf_token %}

        <div class="flex items-center justify-center w-full">
          <label for="dropzone-file"
            class="flex flex-col items-center justify-center w-full h-48 border-2 border-slate-300 border-dashed rounded-2xl cursor-pointer bg-slate-50 hover:bg-slate-100 transition">
            <div class="flex flex-col items-center justify-center pt-5 pb-6">
              <svg class="w-10 h-10 mb-3 text-slate-400" aria-hidden="true" xmlns="http://www.w3.org/2000/svg"
                fill="none" viewBox="0 0 20 16">
                <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M13 13h3a3 3 0 0 0 0-6h-.025A5.56 5.56 0 0 0 16 6.5 5.5 5.5 0 0 0 5.207 5.021C5.137 5.017 5.071 5 5 5a4 4 0 0 0 0 8h2.167M10 15V6m0 0L8 8m2-2 2 2" />
              </svg>
              <p class="mb-2 text-sm text-slate-500">
                <span class="font-semibold">Click to upload</span> or drag and
                drop
              </p>
              <p class="text-xs text-slate-500">.XLSX, .XLS, or .CSV</p>
            </div>
            <input id="dropzone-file" type="file" name="excel_file" accept=".xlsx, .csv" class="hidden" required />
          </label>
        </div>

        <div class="flex gap-3 pt-2">
          <a href="{% url 'inventory-list' %}"
            class="flex-1 rounded-full bg-white px-4 py-2.5 text-center text-sm font-semibold text-slate-700 shadow-sm ring-1 ring-inset ring-slate-300 hover:bg-slate-50 transition">
            Cancel
          </a>
          <button type="submit"
            class="flex-1 rounded-full bg-brand-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-brand-500 transition">
            Upload File
          </button>
        </div>
      </form>
    </section>
  </main>
</body>

</html>
