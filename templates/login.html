{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - ITS Inventory</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{% static 'css/inventory.css' %}" />
  <script src="{% static 'js/tailwind-config.js' %}"></script>
  <link rel="stylesheet" href="{% static 'css/login.css' %}" />
</head>
<body class="login-page font-sans text-slate-900 antialiased p-4">
  <div class="login-container">
    <div class="backdrop-card rounded-3xl border border-white/70 shadow-soft ring-1 ring-slate-200/60 p-8 sm:p-10">
      <!-- Brand Header -->
      <div class="flex flex-col items-center justify-center mb-8">
        <div class="h-16 w-16 bg-gradient-to-br from-blue-600 to-blue-800 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/30 mb-4 transform -rotate-3 transition-transform hover:rotate-0">
          <span class="text-3xl font-extrabold text-white">I</span>
        </div>
        <h1 class="text-2xl font-extrabold uppercase tracking-[0.1em] text-slate-800">ITS Inventory</h1>
      </div>
      <!-- Login Form -->
      <form method="POST" action="{% url 'login' %}">
        {% csrf_token %}
        {% if form.errors %}
        <div class="mb-5 rounded-xl bg-red-50 p-4 border border-red-100 flex items-start gap-3 w-full">
          <svg class="h-5 w-5 shrink-0 text-red-500 mt-0.5" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.28 7.22a.75.75 0 00-1.06 1.06L8.94 10l-1.72 1.72a.75.75 0 101.06 1.06L10 11.06l1.72 1.72a.75.75 0 101.06-1.06L11.06 10l1.72-1.72a.75.75 0 00-1.06-1.06L10 8.94 8.28 7.22z" clip-rule="evenodd" />
          </svg>
          <p class="text-sm font-medium text-red-800 leading-snug">Invalid username or password. Please try again.</p>
        </div>
        {% endif %}
        <div class="space-y-5">
          <div>
            <label for="id_username" class="mb-1.5 block text-xs font-bold uppercase tracking-wider text-slate-500">Username</label>
            <div class="relative group">
              <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                <svg class="h-5 w-5 text-slate-400 transition-all duration-300 group-focus-within:text-blue-600 group-focus-within:scale-110" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
              </div>
              <input type="text" name="username" id="id_username" required
                class="block w-full rounded-xl border border-slate-300 pl-11 pr-4 py-3 text-sm font-medium text-slate-900 shadow-sm transition-colors focus:border-blue-600 focus:ring-2 focus:ring-blue-600/20 bg-white focus:bg-white"
                placeholder="Enter your username">
            </div>
          </div>
          <div>
            <label for="id_password" class="mb-1.5 block text-xs font-bold uppercase tracking-wider text-slate-500">Password</label>
            <div class="relative group">
              <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                <svg class="h-5 w-5 text-slate-400 transition-all duration-300 group-focus-within:text-blue-600 group-focus-within:scale-110" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
              </div>
              <input type="password" name="password" id="id_password" required
                class="block w-full rounded-xl border border-slate-300 pl-11 pr-12 py-3 text-sm font-medium text-slate-900 shadow-sm transition-colors focus:border-blue-600 focus:ring-2 focus:ring-blue-600/20 bg-white focus:bg-white"
                placeholder="Enter your password">
              <button type="button" id="togglePassword" class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-blue-600 transition-colors focus:outline-none">
                <!-- Eye Open -->
                <svg id="eyeOpen" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                </svg>
                <!-- Eye Closed -->
                <svg id="eyeClosed" class="h-5 w-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                </svg>
              </button>
            </div>
          </div>
        </div>
        <div class="mt-8">
          <button type="submit"
            class="group flex w-full items-center justify-center gap-3 rounded-xl bg-blue-700 px-4 py-3.5 text-sm font-bold uppercase tracking-wider text-white shadow-lg shadow-blue-600/30 ring-1 ring-inset ring-white/10 transition-all hover:bg-blue-600 hover:-translate-y-0.5 hover:shadow-xl hover:shadow-blue-600/40">
            SIGN IN
            <svg class="h-5 w-5 transition-transform group-hover:translate-x-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3" />
            </svg>
          </button>
        </div>
      </form>
    </div>
    <div class="mt-8 text-center text-xs font-medium text-slate-400 uppercase tracking-widest">
      &copy; 2026 ITS Inventory System
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Toggle Password Visibility
      const toggleBtn = document.getElementById('togglePassword');
      const passwordInput = document.getElementById('id_password');
      const eyeOpen = document.getElementById('eyeOpen');
      const eyeClosed = document.getElementById('eyeClosed');

      if (toggleBtn && passwordInput) {
        toggleBtn.addEventListener('click', () => {
          const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
          passwordInput.setAttribute('type', type);
          if (type === 'text') {
            eyeOpen.classList.add('hidden');
            eyeClosed.classList.remove('hidden');
          } else {
            eyeOpen.classList.remove('hidden');
            eyeClosed.classList.add('hidden');
          }
        });
      }

      // Snappy Icon Animation On Type
      const inputs = document.querySelectorAll('input');
      inputs.forEach(input => {
        input.addEventListener('input', () => {
          const iconWrapper = input.parentElement.querySelector('.pointer-events-none svg');
          if (iconWrapper) {
            // override group focus scaling for this split second
            iconWrapper.style.transform = 'scale(1.25) translateY(-2px)';
            // Adding a small filter or color pop optionally
            iconWrapper.style.color = '#3b82f6'; 
            setTimeout(() => {
              iconWrapper.style.transform = '';
              iconWrapper.style.color = '';
            }, 120);
          }
        });
      });
    });
  </script>
</body>
</html>
